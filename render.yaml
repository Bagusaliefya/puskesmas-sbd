services:
  - type: web
    name: puskesmas-sbd
    env: php
    buildCommand: composer install --no-dev --optimize-autoloader && npm ci && npm run build && php artisan optimize
    envVars:
      - key: APP_NAME
        value: Puskesmas SBD
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://puskesmas-sbd.onrender.com
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: LOG_LEVEL
        value: warning
      - key: FILESYSTEM_DISK
        value: local
